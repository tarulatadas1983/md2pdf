name: goreleaser

on:
  push:
    # Runs automatically when you push a git tag
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetch git tags
        run: git fetch --force --tags

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: stable

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v4
        with:
          distribution: goreleaser
          version: latest
          # If triggered by a tag -> makes an official GitHub Release
          # If triggered manually -> makes a local snapshot test build
          args: ${{ github.ref_type == 'tag' && 'release --clean' || 'release --clean --snapshot' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Captures snapshot files so manual runs aren't wasted
      - name: Upload Snapshot Artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: goreleaser-snapshots
          path: dist/
